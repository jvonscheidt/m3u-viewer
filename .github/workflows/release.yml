name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create GitHub release for the tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --verify-tag \
            --generate-notes || echo "release already exists"

  build:
    name: build (${{ matrix.target }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          name="m3u-viewer-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$name"
          cp README.md "$name"/
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/m3u-viewer.exe" "$name"/
            7z a "$name.zip" "$name" > /dev/null
          else
            cp "target/${{ matrix.target }}/release/m3u-viewer" "$name"/
            tar czf "$name.tar.gz" "$name"
          fi
      - name: Upload binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${{ github.ref_name }}" "m3u-viewer-${{ github.ref_name }}-${{ matrix.target }}".* --clobber

  publish-winget:
    name: publish to winget-pkgs
    needs: build
    # winget-create is only supported on Windows
    runs-on: windows-latest
    # winget-create will read this environment variable to access the GitHub
    # token needed for submitting a PR. See https://aka.ms/winget-create-token
    env:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
    steps:
      - name: Submit package using wingetcreate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $packageId = "jvonscheidt.m3u-viewer"
          $packageVersion = "${{ github.ref_name }}".TrimStart("v")

          $installerUrl = gh release view "${{ github.ref_name }}" `
            --repo "${{ github.repository }}" `
            --json assets `
            --jq '.assets[] | select(.name | endswith("x86_64-pc-windows-msvc.zip")) | .url'

          curl.exe -JLO https://aka.ms/wingetcreate/latest
          .\wingetcreate.exe update $packageId `
            --version $packageVersion `
            --urls "$installerUrl" `
            --submit
